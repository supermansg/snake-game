<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Snake</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="wrap">
    <header class="topbar">
      <h1>Snake Arena</h1>
      <section class="difficulty" aria-label="Difficulty selector">
        <p class="difficulty-label">Difficulty</p>
        <div class="difficulty-buttons" role="group" aria-label="Choose difficulty">
          <button id="difficultyEasy" class="difficulty-btn" data-difficulty="easy" type="button">Easy</button>
          <button id="difficultyMedium" class="difficulty-btn" data-difficulty="medium" type="button">Medium</button>
          <button id="difficultyHard" class="difficulty-btn" data-difficulty="hard" type="button">Hard</button>
        </div>
      </section>
    </header>

    <section class="hud" aria-label="Game status">
      <div class="hud-stat">
        <span class="hud-label">Score</span>
        <strong id="score" class="hud-value">0</strong>
      </div>
      <div class="hud-stat">
        <span class="hud-label">Best</span>
        <strong id="best" class="hud-value">0</strong>
      </div>
      <div class="hud-stat">
        <span class="hud-label">Level</span>
        <strong id="level" class="hud-value">1</strong>
      </div>
      <div class="hud-stat">
        <span class="hud-label">Hazards</span>
        <strong id="hazards" class="hud-value">0</strong>
      </div>
      <div class="status-row">
        <p id="status" class="status-text">Press Start or Arrow Keys</p>
        <span id="modeLabel" class="mode-pill">Medium</span>
      </div>
    </section>

    <section class="board-shell" aria-label="Game board frame">
      <canvas id="game" width="420" height="420" aria-label="Snake game canvas"></canvas>
    </section>

    <section class="controls" aria-label="Game controls">
      <button id="startBtn" type="button">Start</button>
      <button id="pauseBtn" type="button">Pause</button>
      <button id="restartBtn" type="button">Restart</button>
    </section>

    <section id="touchControls" class="touch-controls" aria-label="Touch controls">
      <div class="touch-header">
        <p class="touch-title">Touch Controls</p>
        <button
          id="touchSettingsToggle"
          class="gear-btn"
          type="button"
          aria-expanded="false"
          aria-controls="touchSettingsPanel"
          aria-label="Open touch settings"
        >
          &#9881;
        </button>
      </div>

      <div id="touchSettingsPanel" class="touch-settings" hidden>
        <div class="touch-toolbar" aria-label="Touch settings">
          <label class="touch-setting" for="controlLayoutSelect">
            <span>Layout</span>
            <select id="controlLayoutSelect">
              <option value="classic">Classic</option>
              <option value="compact">Compact</option>
              <option value="wide">Wide</option>
            </select>
          </label>
          <label class="touch-setting" for="controlSizeSelect">
            <span>Size</span>
            <select id="controlSizeSelect">
              <option value="small">Small</option>
              <option value="medium">Medium</option>
              <option value="large">Large</option>
            </select>
          </label>
          <label class="touch-setting" for="controlSideSelect">
            <span>Side</span>
            <select id="controlSideSelect">
              <option value="left">Left</option>
              <option value="center">Center</option>
              <option value="right">Right</option>
            </select>
          </label>
        </div>
      </div>

      <div class="touch-pad">
        <button class="touch-btn up" data-dir="up" type="button">Up</button>
        <button class="touch-btn left" data-dir="left" type="button">Left</button>
        <button class="touch-btn down" data-dir="down" type="button">Down</button>
        <button class="touch-btn right" data-dir="right" type="button">Right</button>
      </div>
      <p class="touch-hint">Tip: Swipe on the board or use the D-pad</p>
    </section>
  </main>

  <script src="./game.js"></script>
</body>
</html>
